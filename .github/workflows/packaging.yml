name: Packaging CI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag to build, e.g. v0.2.1 or v0.2.1-rc.1. Leave blank to create the next stable patch tag.'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare_release:
    name: Prepare Release Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.resolve_tag.outputs.release_tag }}
      release_version: ${{ steps.resolve_tag.outputs.release_version }}
      created_tag: ${{ steps.resolve_tag.outputs.created_tag }}
      is_prerelease: ${{ steps.resolve_tag.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        env:
          REQUESTED_RELEASE_TAG: ${{ github.event.inputs.release_tag || '' }}
        run: |
          set -euo pipefail

          emit_outputs() {
            local tag="$1"
            local created="$2"
            local version="${tag#v}"
            local is_prerelease="false"

            if [[ "${version}" == *-* ]]; then
              is_prerelease="true"
            fi

            echo "release_tag=${tag}" >> "$GITHUB_OUTPUT"
            echo "release_version=${version}" >> "$GITHUB_OUTPUT"
            echo "created_tag=${created}" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"
          }

          normalize_release_tag() {
            local raw="$1"
            raw="${raw#refs/tags/}"
            if [[ "${raw}" != v* ]]; then
              raw="v${raw}"
            fi
            echo "${raw}"
          }

          validate_release_tag() {
            local tag="$1"
            if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
              echo "Invalid release tag '${tag}'. Use vX.Y.Z or vX.Y.Z-rc.N." >&2
              exit 1
            fi
          }

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
            validate_release_tag "${tag}"
            echo "Using existing tag ${tag}"
            emit_outputs "${tag}" "false"
            exit 0
          fi

          git fetch --tags --force

          if [[ -n "${REQUESTED_RELEASE_TAG}" ]]; then
            requested_tag="$(normalize_release_tag "${REQUESTED_RELEASE_TAG}")"
            validate_release_tag "${requested_tag}"

            if git rev-parse -q --verify "refs/tags/${requested_tag}" >/dev/null; then
              echo "Using existing requested tag ${requested_tag}"
              emit_outputs "${requested_tag}" "false"
              exit 0
            fi

            echo "Creating requested release tag ${requested_tag} for ${GITHUB_SHA}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "${requested_tag}" "${GITHUB_SHA}" -m "Release ${requested_tag}"
            git push origin "refs/tags/${requested_tag}"
            emit_outputs "${requested_tag}" "true"
            exit 0
          fi

          latest_tag="$(git tag -l 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"

          if [[ -z "${latest_tag}" ]]; then
            next_tag="v0.1.0"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${version}"
            major="${major:-0}"
            minor="${minor:-1}"
            patch="${patch:-0}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          echo "Creating new release tag ${next_tag} for ${GITHUB_SHA}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${next_tag}" "${GITHUB_SHA}" -m "Release ${next_tag}"
          git push origin "refs/tags/${next_tag}"

          emit_outputs "${next_tag}" "true"

  build:
    name: Build and Package
    needs: prepare_release
    runs-on: ${{ matrix.os }}
    environment: release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
          ref: ${{ needs.prepare_release.outputs.release_tag }}

      - name: Refresh tags
        run: git fetch --tags --force

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run generate:icons

      - name: Commit generated icons
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add electron/assets/app.icns electron/assets/app.ico electron/assets/favicon.ico electron/assets/favicon-*.png || true
          if git diff --cached --quiet; then
            echo "No icon changes to commit"
          else
            git commit -m "chore(ci): add generated icons"
            git push origin HEAD:main
          fi

      - name: Build renderer
        run: npm run build:renderer

      - name: Prepare mac signing certificate
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          RAW_CSC_LINK: ${{ secrets.CSC_LINK }}
          RAW_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [[ -z "${RAW_CSC_LINK:-}" || -z "${RAW_CSC_KEY_PASSWORD:-}" ]]; then
            echo "Missing CSC_LINK or CSC_KEY_PASSWORD secret for macOS signing." >&2
            exit 1
          fi

          signing_dir="${RUNNER_TEMP}/omvra-signing"
          cert_file="${signing_dir}/certificate.p12"
          keychain_file="${signing_dir}/build.keychain-db"
          keychain_password="$(uuidgen)"

          mkdir -p "${signing_dir}"

          case "${RAW_CSC_LINK}" in
            http://*|https://*|file://*|/*|~/*)
              resolved_csc_link="${RAW_CSC_LINK}"
              ;;
            *)
              printf '%s' "${RAW_CSC_LINK}" | base64 -D -o "${cert_file}"
              resolved_csc_link="${cert_file}"
              ;;
          esac

          security create-keychain -p "${keychain_password}" "${keychain_file}"
          security set-keychain-settings -lut 21600 "${keychain_file}"
          security unlock-keychain -p "${keychain_password}" "${keychain_file}"
          security import "${resolved_csc_link}" -k "${keychain_file}" -P "${RAW_CSC_KEY_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${keychain_password}" "${keychain_file}"
          existing_keychains=()
          while IFS= read -r line; do
            cleaned_line="$(printf '%s' "${line}" | sed 's/^[[:space:]]*//; s/"//g')"
            if [[ -n "${cleaned_line}" ]]; then
              existing_keychains+=("${cleaned_line}")
            fi
          done < <(security list-keychains -d user)
          security list-keychains -d user -s "${keychain_file}" "${existing_keychains[@]}"

          echo "CSC_LINK=${resolved_csc_link}" >> "${GITHUB_ENV}"
          echo "CSC_KEY_PASSWORD=${RAW_CSC_KEY_PASSWORD}" >> "${GITHUB_ENV}"
          echo "KEYCHAIN_PATH=${keychain_file}" >> "${GITHUB_ENV}"
          echo "KEYCHAIN_PASSWORD=${keychain_password}" >> "${GITHUB_ENV}"

      - name: Inspect mac signing identities
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

      - name: Validate notarization credentials
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          [[ -n "${APPLE_ID:-}" ]] || { echo "Missing APPLE_ID" >&2; exit 1; }
          [[ -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]] || { echo "Missing APPLE_APP_SPECIFIC_PASSWORD" >&2; exit 1; }
          [[ -n "${APPLE_TEAM_ID:-}" ]] || { echo "Missing APPLE_TEAM_ID" >&2; exit 1; }

      - name: Package app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_REF_TYPE: tag
          GITHUB_REF_NAME: ${{ needs.prepare_release.outputs.release_tag }}
        run: npm run build:electron

      - name: Inspect packaged mac app signature
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          signature_output="$(codesign -dv --verbose=4 release/mac-arm64/Omvra.app 2>&1)"
          printf '%s\n' "${signature_output}"
          if printf '%s' "${signature_output}" | grep -q 'Signature=adhoc'; then
            echo "Packaged macOS app is still ad-hoc signed." >&2
            exit 1
          fi
          spctl -a -vvv -t exec release/mac-arm64/Omvra.app || true

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: electron-artifacts-${{ matrix.os }}
          path: release/*

  release:
    name: Create Release
    needs:
      - prepare_release
      - build
    runs-on: ubuntu-latest
    if: ${{ needs.prepare_release.result == 'success' && needs.build.result == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v7
        with:
          name: electron-artifacts-macos-latest
          path: ./artifacts/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v7
        with:
          name: electron-artifacts-windows-latest
          path: ./artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v7
        with:
          name: electron-artifacts-ubuntu-latest
          path: ./artifacts/linux

      - name: Create or update release metadata
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
          IS_PRERELEASE: ${{ needs.prepare_release.outputs.is_prerelease }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" --repo "${GH_REPO}" >/dev/null 2>&1; then
            if [[ "${IS_PRERELEASE}" == "true" ]]; then
              gh release edit "${RELEASE_TAG}" --repo "${GH_REPO}" --title "${RELEASE_TAG}" --prerelease --latest=false
            else
              gh release edit "${RELEASE_TAG}" --repo "${GH_REPO}" --title "${RELEASE_TAG}" --prerelease=false --latest
            fi
          else
            create_args=(release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --verify-tag)
            if [[ "${IS_PRERELEASE}" == "true" ]]; then
              create_args+=(--prerelease --latest=false)
            else
              create_args+=(--latest)
            fi
            gh "${create_args[@]}" --repo "${GH_REPO}"
          fi

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare_release.outputs.release_tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(
            ./artifacts/macos/*.dmg
            ./artifacts/macos/*.dmg.blockmap
            ./artifacts/macos/*.zip
            ./artifacts/macos/*.zip.blockmap
            ./artifacts/macos/latest*.yml
            ./artifacts/windows/*.exe
            ./artifacts/windows/*.blockmap
            ./artifacts/windows/latest*.yml
            ./artifacts/linux/*.AppImage
            ./artifacts/linux/latest*.yml
          )

          if [[ ${#assets[@]} -eq 0 ]]; then
            echo "No release assets found to upload." >&2
            exit 1
          fi

          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber --repo "${GH_REPO}"
